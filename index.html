<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Hardware Integration Monitor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        h2 {
            color: #2d3748;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        select, input {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            min-width: 150px;
        }
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .project-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        .project-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .project-info {
            margin: 8px 0;
        }
        .project-info strong {
            color: #4a5568;
        }
        .stars-badge {
            display: inline-block;
            background: linear-gradient(45deg, #f6ad55, #ed8936);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .high-stars {
            background: linear-gradient(45deg, #48bb78, #38a169);
        }
        .medium-stars {
            background: linear-gradient(45deg, #ed8936, #dd6b20);
        }
        .low-stars {
            background: linear-gradient(45deg, #e53e3e, #c53030);
        }
        .platform-tag {
            display: inline-block;
            background: #cbd5e0;
            color: #2d3748;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.8em;
            margin-right: 5px;
            margin-top: 5px;
        }
        .product-link {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .product-link:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
            .filters {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 OpenClaw Hardware Integration Monitor</h1>
        
        <div class="filters">
            <select id="categoryFilter">
                <option value="">All Application Categories</option>
                <option value="robotics">Robotics Control</option>
                <option value="iot">IoT (Internet of Things)</option>
                <option value="embedded">Embedded Development</option>
                <option value="maker">Maker Projects</option>
            </select>
            
            <select id="platformFilter">
                <option value="">All Technology Platforms</option>
                <option value="esp32">ESP32</option>
                <option value="Arduino">Arduino</option>
                <option value="raspberry">Raspberry Pi</option>
                <option value="jetson">NVIDIA Jetson</option>
            </select>
            
            <input type="text" id="searchInput" placeholder="Search project name or description...">
        </div>
        
        <div id="projectsContainer">
            <!-- Project cards will be generated dynamically by JavaScript -->
        </div>
    </div>

    <script>
        const projects = [
            // Robotics Control
            {

                description: "Your own personal AI assistant. Any OS. Any Platform. The lobster way.",
                githubUrl: "https://github.com/openclaw/openclaw",
                stars: 251095,
                category: "robotics",
                platforms: ["any"],
                tags: [],
                productLinks: [],
                lastUpdated: "2026-03-03T08:39:19Z"
            },
            {
                name: "clawd-reachy-mini",
                description: "Reachy Mini robotics integration project for OpenClaw",
                githubUrl: "https://github.com/ArturSkowronski/clawd-reachy-mini",
                stars: 26,
                category: "robotics", 
                platforms: ["robotics", "python"],
                tags: [],
                productLinks: [
                    "https://www.pollenrobotics.com/reachy"
                ],
                lastUpdated: "2026-03-03T05:56:21Z"
            },
            {
                name: "clawbody",
                description: "Robotics integration control stack for OpenClaw",
                githubUrl: "https://github.com/tomrikert/clawbody",
                stars: 8,
                category: "robotics",
                platforms: ["robotics"],
                tags: [],
                productLinks: [],
                lastUpdated: "2026-03-01T21:59:07Z"
            },
            
            // IoT (Internet of Things)
            {
                name: "WireClaw",
                description: "ESP32 AI agent with persistent memory and offline rule engine - chat to configure, run locally 24/7",
                githubUrl: "https://github.com/M64GitHub/WireClaw",
                stars: 30,
                category: "iot",
                platforms: ["esp32", "Arduino", "iot"],
                tags: [],
                productLinks: [
                    "https://docs.espressif.com/projects/esp-idf/en/latest/esp32/hw-reference/esp32/get-started-devkitc.html",
                    "https://wireclaw.io"
                ],
                lastUpdated: "2026-03-03T04:58:57Z"
            },
            {
                name: "IOnode",
                description: "ESP32 Fleet management with NATS protocol support - OpenClaw-ready",
                githubUrl: "https://github.com/M64GitHub/IOnode",
                stars: 2,
                category: "iot",
                platforms: ["esp32", "Arduino", "iot", "nats"],
                tags: [],
                productLinks: [
                    "https://docs.espressif.com/projects/esp-idf/en/latest/esp32/hw-reference/esp32/get-started-devkitc.html"
                ],
                lastUpdated: "2026-02-25T23:03:04Z"
            },
            
            // Seeed Studio Integration
            {
                name: "openclaw-esp32c3-xiao-node",
                description: "OpenClaw node firmware for Seeed XIAO ESP32-C3 + Expansion Board (~$13 IoT peripheral)",
                githubUrl: "https://github.com/chilu18/openclaw-esp32c3-xiao-node",
                stars: 4,
                category: "embedded",
                platforms: ["esp32", "xiao"],
                tags: ["seeed-studio"],
                productLinks: [
                    "https://www.seeedstudio.com/XIAO-ESP32C3-p-5440.html",
                    "https://www.seeedstudio.com/XIAO-ESP32C3-Expansion-board-p-5610.html"
                ],
                lastUpdated: "2026-02-26T17:58:59Z"
            },
            
            // Maker Projects - Arduino Skills
            {
                name: "Arduino Maker Skill (DmitrySolana)",
                description: "OpenClaw skill for guiding Arduino/ESP32 projects - code generation, wiring help, troubleshooting",
                githubUrl: "https://github.com/DmitrySolana/Arduino-maker",
                stars: 3,
                category: "maker",
                platforms: ["Arduino", "esp32", "maker"],
                tags: [],
                productLinks: [
                    "https://store.arduino.cc/products/arduino-uno-rev3"
                ],
                lastUpdated: "2026-02-20T04:44:22Z"
            },
            {
                name: "Arduino Maker Skill (sergiopesch)",
                description: "OpenClaw skill for guiding Arduino/ESP32 projects - code generation, wiring help, troubleshooting",
                githubUrl: "https://github.com/sergiopesch/Arduino-maker",
                stars: 0,
                category: "maker",
                platforms: ["Arduino", "esp32", "maker"],
                tags: [],
                productLinks: [
                    "https://store.arduino.cc/products/arduino-uno-rev3"
                ],
                lastUpdated: "2026-02-01T04:29:02Z"
            },
            {
                name: "arduinomaker (DmitrySolana)",
                description: "OpenClaw skill for guiding Arduino/ESP32 projects - code generation, wiring help, troubleshooting",
                githubUrl: "https://github.com/DmitrySolana/arduinomaker",
                stars: 3,
                category: "maker",
                platforms: ["Arduino", "esp32", "maker"],
                tags: [],
                productLinks: [
                    "https://store.arduino.cc/products/arduino-uno-rev3"
                ],
                lastUpdated: "2026-02-07T04:58:34Z"
            }
        ];

        function getStarsBadgeClass(stars) {
            if (stars >= 100) return 'high-stars';
            if (stars >= 10) return 'medium-stars';
            return 'low-stars';
        }

        function createProjectCard(project) {
            const badgeClass = getStarsBadgeClass(project.stars);
            const platformTags = project.platforms.map(platform => 
                `<span class="platform-tag">${platform}</span>`
            ).join('');
            
            const tagTags = project.tags.map(tag => 
                `<span class="platform-tag" style="background: #667eea; color: white;">${tag}</span>`
            ).join('');
            
            const productLinks = project.productLinks.map(link => 
                `<div class="project-info"><strong>Product Link:</strong> <a href="${link}" class="product-link" target="_blank">${link}</a></div>`
            ).join('');
            
            return `
                <div class="project-card" data-category="${project.category}" data-platforms="${project.platforms.join(' ')}" data-tags="${project.tags.join(' ')}">
                    <div class="project-title">${project.name}</div>
                    <div class="project-info">${project.description}</div>
                    <div class="project-info"><strong>GitHub:</strong> <a href="${project.githubUrl}" class="product-link" target="_blank">${project.githubUrl}</a></div>
                    ${productLinks}
                    <div class="project-info"><strong>Last Updated:</strong> ${new Date(project.lastUpdated).toLocaleString('en-US')}</div>
                    <div class="project-info"><strong>Platforms:</strong> ${platformTags}</div>
                    ${tagTags ? `<div class="project-info"><strong>Tags:</strong> ${tagTags}</div>` : ''}
                    <div class="stars-badge ${badgeClass}">
                        ⭐ Stars: ${project.stars.toLocaleString()}
                    </div>
                </div>
            `;
        }

        function filterProjects() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const platformFilter = document.getElementById('platformFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            return projects.filter(project => {
                // Application category filter
                if (categoryFilter && project.category !== categoryFilter) {
                    return false;
                }
                
                // Technology platform filter
                if (platformFilter) {
                    if (!project.platforms.includes(platformFilter)) {
                        return false;
                    }
                }
                
                // Search filter
                if (searchInput) {
                    const searchText = `${project.name} ${project.description}`.toLowerCase();
                    if (!searchText.includes(searchInput)) {
                        return false;
                    }
                }
                
                return true;
            });
        }

        function renderProjects() {
            const projectsContainer = document.getElementById('projectsContainer');
            const filteredProjects = filterProjects();
            
            if (filteredProjects.length === 0) {
                projectsContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No matching projects found</div>';
                return;
            }
            
            // Sort by stars (descending)
            const sortedProjects = filteredProjects.sort((a, b) => b.stars - a.stars);
            
            projectsContainer.innerHTML = sortedProjects.map(createProjectCard).join('');
        }

        // Bind event listeners
        document.getElementById('categoryFilter').addEventListener('change', renderProjects);
        document.getElementById('platformFilter').addEventListener('change', renderProjects);
        document.getElementById('searchInput').addEventListener('input', renderProjects);

        // Initial render
        renderProjects();
    </script>
</body>
</html>
