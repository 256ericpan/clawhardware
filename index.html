        function getStarsBadgeClass(stars) {
            if (stars >= 100) return 'high-stars';
            if (stars >= 10) return 'medium-stars';
            return 'low-stars';
        }

        function createProjectCard(project) {
            const badgeClass = getStarsBadgeClass(project.stars);
            const platformTags = project.platforms.map(platform => 
                `<span class="platform-tag">${platform}</span>`
            ).join('');
            
            const tagTags = project.tags.map(tag => 
                `<span class="platform-tag" style="background: #667eea; color: white;">${tag}</span>`
            ).join('');
            
            const productLinks = project.productLinks.map(link => 
                `<div class="project-info"><strong>Product Link:</strong> <a href="${link}" class="product-link" target="_blank">${link}</a></div>`
            ).join('');
            
            return `
                <div class="project-card" data-category="${project.category}" data-platforms="${project.platforms.join(' ')}" data-tags="${project.tags.join(' ')}">
                    <div class="project-title">${project.name}</div>
                    <div class="project-info">${project.description}</div>
                    <div class="project-info"><strong>GitHub:</strong> <a href="${project.githubUrl}" class="product-link" target="_blank">${project.githubUrl}</a></div>
                    ${productLinks}
                    <div class="project-info"><strong>Last Updated:</strong> ${new Date(project.lastUpdated).toLocaleString('en-US')}</div>
                    <div class="project-info"><strong>Platforms:</strong> ${platformTags}</div>
                    ${tagTags ? `<div class="project-info"><strong>Tags:</strong> ${tagTags}</div>` : ''}
                    <div class="stars-badge ${badgeClass}">
                        ⭐ Stars: ${project.stars.toLocaleString()}
                    </div>
                </div>
            `;
        }

        function filterProjects() {
            const categoryFilter = document.getElementById('categoryFilter').value;
            const platformFilter = document.getElementById('platformFilter').value;
            const searchInput = document.getElementById('searchInput').value.toLowerCase();

            return projects.filter(project => {
                // Application category filter
                if (categoryFilter && project.category !== categoryFilter) {
                    return false;
                }
                
                // Technology platform filter
                if (platformFilter) {
                    if (!project.platforms.includes(platformFilter)) {
                        return false;
                    }
                }
                
                // Search filter
                if (searchInput) {
                    const searchText = `${project.name} ${project.description}`.toLowerCase();
                    if (!searchText.includes(searchInput)) {
                        return false;
                    }
                }
                
                return true;
            });
        }

        function renderProjects() {
            const projectsContainer = document.getElementById('projectsContainer');
            const filteredProjects = filterProjects();
            
            if (filteredProjects.length === 0) {
                projectsContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No matching projects found</div>';
                return;
            }
            
            // Sort by stars (descending)
            const sortedProjects = filteredProjects.sort((a, b) => b.stars - a.stars);
            
            projectsContainer.innerHTML = sortedProjects.map(createProjectCard).join('');
        }

        // Bind event listeners
        document.getElementById('categoryFilter').addEventListener('change', renderProjects);
        document.getElementById('platformFilter').addEventListener('change', renderProjects);
        document.getElementById('searchInput').addEventListener('input', renderProjects);

        // Initial render
        renderProjects();
    </script>
