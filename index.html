<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 OpenClaw Hardware Projects</title>
<style>
:root { --primary: #6366f1; --card: #ffffff; --text: #1e293b; --text-light: #64748b; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); min-height: 100vh; padding: 40px 20px; }
.container { max-width: 1400px; margin: 0 auto; }
header { text-align: center; margin-bottom: 40px; }
h1 { color: white; font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
.subtitle { color: rgba(255,255,255,0.7); font-size: 1.1rem; }
.stats-bar { display: flex; justify-content: center; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
.stat-item { background: rgba(255,255,255,0.1); padding: 12px 24px; border-radius: 50px; color: white; display: flex; align-items: center; gap: 8px; }
.stat-num { font-weight: 700; color: #fbbf24; }
.filters-card { background: var(--card); border-radius: 20px; padding: 24px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.filters-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-group label { font-weight: 600; font-size: 14px; color: var(--text-light); }
select, input { padding: 10px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 14px; background: white; min-width: 150px; }
.platform-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.platform-tag { background: #f1f5f9; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 2px solid transparent; }
.platform-tag.active { background: var(--primary); color: white; }
.results-info { color: white; margin-bottom: 20px; font-size: 15px; }
.results-info span { font-weight: 600; color: #fbbf24; }
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 24px; }
.project-card { background: var(--card); border-radius: 20px; padding: 24px; transition: all 0.3s; border: 2px solid transparent; position: relative; }
.project-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.15); border-color: var(--primary); }
.project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), #8b5cf6); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.project-name { font-size: 1.3rem; font-weight: 700; color: var(--text); }
.project-name a { color: inherit; text-decoration: none; }
.badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.badge-category { background: #ede9fe; color: #7c3aed; }
.badge-seeed { background: #ffedd5; color: #ea580c; }
.badge-core { background: #dbeafe; color: #1d4ed8; }

.card-body { margin-bottom: 16px; font-size: 14px; color: var(--text-light); line-height: 1.6; }
.card-body strong { color: var(--text); }
.card-body a { color: #3b82f6; text-decoration: none; }
.supply-btn { display: inline-block; background: #ea580c; color: white; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; margin-left: 8px; }
.supply-btn:hover { background: #c2410c; }

.info-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #e2e8f0; }
.info-bom { font-size: 14px; color: var(--text-light); }
.info-bom strong { color: var(--text); }
.stars-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; padding: 10px 18px; border-radius: 20px; font-weight: 700; font-size: 16px; }
.stars-badge.hot { background: linear-gradient(135deg, #22c55e, #16a34a); }
.daily-badge { margin-left: 10px; color: #22c55e; font-size: 14px; font-weight: 600; }

@media (max-width: 768px) { .project-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<header>
<h1>🤖 OpenClaw Hardware Projects</h1>
<p class="subtitle">OpenClaw 生态硬件项目监测</p>
<div class="stats-bar">
<div class="stat-item">📦 <span class="stat-num">18</span> Projects</div>
<div class="stat-item">🏷️ <span class="stat-num">29</span> Platforms</div>
<div class="stat-item">⭐ <span class="stat-num">331,385</span> Stars</div>
</div>
</header>
<div class="filters-card">
<div class="filters-row">
<div class="filter-group">
<label>Category:</label>
<select id="categoryFilter">
<option value="">All</option>
<option value="ai-compute">ai-compute</option><option value="alternative">alternative</option><option value="core">core</option><option value="embedded">embedded</option><option value="iot">iot</option><option value="robotics">robotics</option>
</select>
</div>
<div class="filter-group">
<input type="text" id="searchInput" placeholder="Search..." style="min-width: 250px;">
</div>
</div>
<div class="platform-tags" id="platformTags">
<span class="platform-tag active" data-platform="">All</span>
<span class="platform-tag" data-platform="Android">Android</span><span class="platform-tag" data-platform="Camera">Camera</span><span class="platform-tag" data-platform="Cloud">Cloud</span><span class="platform-tag" data-platform="Desktop">Desktop</span><span class="platform-tag" data-platform="E-Ink">E-Ink</span><span class="platform-tag" data-platform="ESP32">ESP32</span><span class="platform-tag" data-platform="Edge">Edge</span><span class="platform-tag" data-platform="Humanoid">Humanoid</span><span class="platform-tag" data-platform="Linux">Linux</span><span class="platform-tag" data-platform="Mac">Mac</span><span class="platform-tag" data-platform="Mobile">Mobile</span><span class="platform-tag" data-platform="NVIDIA Jetson">NVIDIA Jetson</span><span class="platform-tag" data-platform="Orin">Orin</span><span class="platform-tag" data-platform="PC">PC</span><span class="platform-tag" data-platform="Pico">Pico</span><span class="platform-tag" data-platform="Quadruped">Quadruped</span><span class="platform-tag" data-platform="RISC-V">RISC-V</span><span class="platform-tag" data-platform="ROS2">ROS2</span><span class="platform-tag" data-platform="Raspberry Pi">Raspberry Pi</span><span class="platform-tag" data-platform="Reachy">Reachy</span><span class="platform-tag" data-platform="Robot">Robot</span><span class="platform-tag" data-platform="Seeed">Seeed</span><span class="platform-tag" data-platform="Seeed XIAO">Seeed XIAO</span><span class="platform-tag" data-platform="Server">Server</span><span class="platform-tag" data-platform="Sipeed">Sipeed</span><span class="platform-tag" data-platform="Voice">Voice</span><span class="platform-tag" data-platform="Windows">Windows</span><span class="platform-tag" data-platform="XIAO">XIAO</span><span class="platform-tag" data-platform="iOS">iOS</span>
</div>
</div>
<p class="results-info">Showing <span id="projectCount">0</span> projects</p>
<div class="project-grid" id="projectsContainer"></div>
</div>
<script>
const projects = [{"name": "Official OpenClaw Repository", "stars": 251095, "category": "core", "platforms": ["PC", "Mac", "Linux", "Windows", "iOS", "Android"], "description": "Your personal AI assistant. Supports any OS and platform. Highlights: Full feature set, active community, 5400+ skills.", "github_url": "https://github.com/openclaw/openclaw", "seeedstudio": false, "product_links": [], "bom_cost": "$0", "daily_increment": 87}, {"name": "Nanobot", "stars": 29724, "category": "alternative", "platforms": ["Mobile", "iOS", "Android"], "description": "Ultra-lightweight OpenClaw variant, 99% smaller code footprint. Highlights: Minimal resources, fast startup, mobile-first.", "github_url": "https://github.com/HKUDS/nanobot", "seeedstudio": false, "product_links": [], "bom_cost": "Free", "daily_increment": 45}, {"name": "ZeroClaw", "stars": 24059, "category": "alternative", "platforms": ["PC", "Server", "Cloud"], "description": "Fast, small, autonomous AI infrastructure. Highlights: Production-ready, scalable, Rust-based.", "github_url": "https://github.com/zeroclaw-labs/zeroclaw", "seeedstudio": false, "product_links": [], "bom_cost": "$5-20/mo", "daily_increment": 32}, {"name": "Sipeed PicoClaw", "stars": 21800, "category": "alternative", "platforms": ["Pico", "Sipeed", "RISC-V"], "description": "Official Sipeed release. Tiny, fast, deployable anywhere. Highlights: RISC-V support, embedded deployment, open source.", "github_url": "https://github.com/sipeed/picoclaw", "seeedstudio": false, "product_links": [{"url": "https://www.sipeed.com/picoclaw", "price": "$15-30"}], "bom_cost": "$15-30", "daily_increment": 25}, {"name": "MimiClaw", "stars": 3700, "category": "embedded", "platforms": ["ESP32", "Raspberry Pi"], "description": "Run OpenClaw on $5 chip without OS. Highlights: Ultra-low cost, no Linux needed, bare-metal.", "github_url": "https://github.com/memovai/mimiclaw", "seeedstudio": false, "product_links": [], "bom_cost": "$5-15", "daily_increment": 12}, {"name": "ModelAssistant", "stars": 424, "category": "ai-compute", "platforms": ["NVIDIA Jetson", "Edge", "Seeed"], "description": "Seeed embedded AI deployment tool. Highlights: Model zoo, Jetson support, easy deploy.", "github_url": "https://github.com/Seeed-Studio/ModelAssistant", "seeedstudio": true, "product_links": [{"url": "https://www.seeedstudio.com/reComputer-J4012.html", "price": "$300"}], "bom_cost": "$200-500", "daily_increment": 5}, {"name": "reCamera", "stars": 389, "category": "ai-compute", "platforms": ["Camera", "Seeed"], "description": "Open-source AI camera series. Highlights: Edge AI, vision processing, modular.", "github_url": "https://github.com/Seeed-Studio/reCamera", "seeedstudio": true, "product_links": [{"url": "https://www.seeedstudio.com/reCamera", "price": "$99"}], "bom_cost": "$50-150", "daily_increment": 4}, {"name": "SenseCraft AI Server", "stars": 60, "category": "ai-compute", "platforms": ["Edge", "NVIDIA Jetson", "Seeed"], "description": "AI server for edge devices. Highlights: Edge computing, low latency, local AI.", "github_url": "https://github.com/Seeed-Studio/SenseCraft-AI_Server", "seeedstudio": true, "product_links": [{"url": "https://www.seeedstudio.com/sensecap-ai-watchers.html", "price": "$150"}], "bom_cost": "$100-300", "daily_increment": 2}, {"name": "WireClaw", "stars": 31, "category": "iot", "platforms": ["ESP32"], "description": "ESP32 AI agent with persistent memory. Highlights: Offline rules, local config, IoT integration.", "github_url": "https://github.com/M64GitHub/WireClaw", "seeedstudio": false, "product_links": [{"url": "https://www.seeedstudio.com/XIAO-ESP32C3.html", "price": "$10"}], "bom_cost": "$10-20", "daily_increment": 1}, {"name": "Reachy Mini (OpenClaw)", "stars": 26, "category": "robotics", "platforms": ["Robot", "Reachy"], "description": "Voice interface for Reachy Mini robot. Highlights: WebSocket integration, physical embodiment, expressive.", "github_url": "https://github.com/ArturSkowronski/clawd-reachy-mini", "seeedstudio": false, "product_links": [], "bom_cost": "$2000-5000", "daily_increment": 0}, {"name": "OpenClaw Pi Installation", "stars": 21, "category": "embedded", "platforms": ["Raspberry Pi"], "description": "Secure installation guide for Raspberry Pi 4. Highlights: Security hardened, easy setup, stable.", "github_url": "https://github.com/Demwunz/openclaw-pi-installation", "seeedstudio": false, "product_links": [{"url": "https://www.raspberrypi.com/products/raspberry-pi-4/", "price": "$55"}], "bom_cost": "$50-100", "daily_increment": 0}, {"name": "OpenClawgotchi", "stars": 15, "category": "iot", "platforms": ["Raspberry Pi", "E-Ink"], "description": "AI Tamagotchi with E-ink display. Highlights: Fun project, E-ink display, low power.", "github_url": "https://github.com/turmyshevd/openclawgotchi", "seeedstudio": false, "product_links": [{"url": "https://www.raspberrypi.com/products/raspberry-pi-zero-2-w/", "price": "$15"}], "bom_cost": "$30-50", "daily_increment": 0}, {"name": "OpenClaw Robotics", "stars": 14, "category": "robotics", "platforms": ["Robot", "Humanoid", "Quadruped"], "description": "High-performance control stack for Embodied AI. Highlights: WBC interfaces, sim-to-real, low-latency.", "github_url": "https://github.com/LooperRobotics/OpenClaw-Robotics", "seeedstudio": false, "product_links": [], "bom_cost": "$2000-20000", "daily_increment": 1}, {"name": "OpenClaw X", "stars": 11, "category": "embedded", "platforms": ["PC", "Desktop"], "description": "Simple desktop UI for OpenClaw. Highlights: User-friendly, GUI alternative, easy access.", "github_url": "https://github.com/next-open-ai/openclawx", "seeedstudio": false, "product_links": [], "bom_cost": "$0", "daily_increment": 0}, {"name": "OpenClaw Xiaozhi", "stars": 10, "category": "iot", "platforms": ["ESP32", "Voice", "XIAO"], "description": "Voice interface using ESP32-S3. Highlights: Low-cost voice, local processing, ready to use.", "github_url": "https://github.com/tigerbryan/openclaw-xiaozhi", "seeedstudio": false, "product_links": [{"url": "https://www.seeedstudio.com/XIAO-ESP32S3-Sense.html", "price": "$15"}], "bom_cost": "$15-25", "daily_increment": 0}, {"name": "OpenClaw XIAO Node", "stars": 4, "category": "embedded", "platforms": ["Seeed XIAO", "ESP32"], "description": "Firmware for Seeed XIAO ESP32-C3. Highlights: $13 BOM, IoT ready, small footprint.", "github_url": "https://github.com/chilu18/openclaw-esp32c3-xiao-node", "seeedstudio": true, "product_links": [{"url": "https://www.seeedstudio.com/XIAO-ESP32C3.html", "price": "$10"}], "bom_cost": "$10-15", "daily_increment": 0}, {"name": "Jetson OpenClaw", "stars": 1, "category": "ai-compute", "platforms": ["NVIDIA Jetson", "Orin"], "description": "OpenClaw on Jetson Orin Nano with LLM + hardware control. Highlights: Edge AI, GPU acceleration, vision ready.", "github_url": "https://github.com/rhuanssauro/jetson-openclaw", "seeedstudio": false, "product_links": [{"url": "https://www.nvidia.com/en-us/autonomous-machines/embedded-systems/jetson-orin/", "price": "$750"}], "bom_cost": "$500-1500", "daily_increment": 0}, {"name": "OpenClaw ROS2", "stars": 1, "category": "robotics", "platforms": ["ROS2", "Robot"], "description": "Control robots via ROS2. Highlights: ROS integration, existing robot support.", "github_url": "https://github.com/moe-sani/openclaw_ros2", "seeedstudio": false, "product_links": [], "bom_cost": "$500-5000", "daily_increment": 0}];

document.querySelectorAll('.platform-tag').forEach(tag => {
tag.addEventListener('click', function() {
document.querySelectorAll('.platform-tag').forEach(t => t.classList.remove('active'));
this.classList.add('active');
renderProjects();
});
});
document.getElementById('categoryFilter').addEventListener('change', renderProjects);
document.getElementById('searchInput').addEventListener('input', renderProjects);

function filterProjects() {
const activePlatform = document.querySelector('.platform-tag.active').dataset.platform;
const category = document.getElementById('categoryFilter').value;
const search = document.getElementById('searchInput').value.toLowerCase();
return projects.filter(p => {
const platformMatch = !activePlatform || p.platforms.includes(activePlatform);
const categoryMatch = !category || p.category === category;
const searchMatch = !search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
return platformMatch && categoryMatch && searchMatch;
});
}

function createProjectCard(p) {
const starsClass = p.stars > 1000 ? 'hot' : '';
const dailyText = p.daily_increment > 0 ? '<span class="daily-badge">↑ ' + p.daily_increment + '</span>' : '';

// Badge
let badge = '<span class="badge badge-category">' + p.category + '</span>';
if (p.category === 'core') badge = '<span class="badge badge-core">⭐ Core</span>';
if (p.seeedstudio) badge += '<span class="badge badge-seeed">SeeedStudio</span>';

// Hardware
const hardwareText = p.platforms.join(', ');

// Supply button
let supplyBtn = '';
if (p.product_links && p.product_links.length > 0) {
p.product_links.forEach(link => {
supplyBtn += '<a href="' + link.url + '" target="_blank" class="supply-btn">Supply ' + link.price + '</a>';
});
}

return '<div class="project-card">' +
'<div class="card-header"><div class="project-name"><a href="' + p.github_url + '" target="_blank">' + p.name + '</a></div></div>' +
'<div class="badges">' + badge + '</div>' +

'<div class="card-body"><strong>Hardware:</strong> ' + hardwareText + ' ' + supplyBtn + '</div>' +
'<div class="card-body">' + p.description + '</div>' +

'<div class="info-bottom"><div class="info-bom"><strong>' + p.bom_cost + '</strong></div>' +
'<div><span class="stars-badge ' + starsClass + '">⭐ ' + p.stars.toLocaleString() + '</span>' + dailyText + '</div></div></div>';
}

function renderProjects() {
const filtered = filterProjects();
document.getElementById('projectCount').textContent = filtered.length;
document.getElementById('projectsContainer').innerHTML = filtered.map(createProjectCard).join('');
}

renderProjects();
</script>
</body>
</html>
