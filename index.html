<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Hardware Integration Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #4a5568; margin-bottom: 30px; }
        .filters { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 5px; }
        .filter-group label { font-weight: bold; font-size: 14px; }
        select, input { padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; cursor: pointer; }
        select:hover, input:hover { border-color: #667eea; }
        .platform-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .platform-tag { background: #e2e8f0; padding: 4px 10px; border-radius: 15px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .platform-tag:hover, .platform-tag.active { background: #667eea; color: white; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .project-card { border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; transition: all 0.3s; background: #f8fafc; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); border-color: #667eea; }
        .project-title { font-size: 1.2em; font-weight: bold; color: #2d3748; margin-bottom: 8px; }
        .project-info { margin: 5px 0; font-size: 14px; color: #4a5568; }
        .stars-badge { display: inline-block; background: linear-gradient(45deg, #f6ad55, #ed8936); color: white; padding: 3px 10px; border-radius: 12px; font-size: 14px; margin-top: 10px; }
        .stars-badge.high { background: linear-gradient(45deg, #48bb78, #38a169); }
        .platform-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
        .platform-chip { background: #cbd5e0; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .platform-chip.seeed { background: #48bb78; color: white; }
        .product-links { margin-top: 10px; }
        .product-link { display: inline-block; background: #3182ce; color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; text-decoration: none; margin-right: 5px; }
        .product-link:hover { background: #2c5282; }
        .daily-badge { font-size: 11px; color: #38a169; margin-left: 5px; }
        .category-tag { display: inline-block; background: #805ad5; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .seeed-badge { background: #dd6b20; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OpenClaw Hardware Integration Monitor</h1>
        
        <div class="filters">
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All</option>
                    <option value="ai-compute">ai-compute</option>
                    <option value="alternative">alternative</option>
                    <option value="embedded">embedded</option>
                    <option value="iot">iot</option>
                    <option value="maker">maker</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Search projects...">
            </div>
        </div>
        
        <div class="platform-tags" id="platformTags">
            <span class="platform-tag active" data-platform="">All</span>
            <span class="platform-tag" data-platform="AI">AI</span>
            <span class="platform-tag" data-platform="Android">Android</span>
            <span class="platform-tag" data-platform="Camera">Camera</span>
            <span class="platform-tag" data-platform="Cloud">Cloud</span>
            <span class="platform-tag" data-platform="ESP32">ESP32</span>
            <span class="platform-tag" data-platform="Edge">Edge</span>
            <span class="platform-tag" data-platform="Linux">Linux</span>
            <span class="platform-tag" data-platform="Mac">Mac</span>
            <span class="platform-tag" data-platform="Mobile">Mobile</span>
            <span class="platform-tag" data-platform="NVIDIA Jetson">NVIDIA Jetson</span>
            <span class="platform-tag" data-platform="Orin">Orin</span>
            <span class="platform-tag" data-platform="PC">PC</span>
            <span class="platform-tag" data-platform="Pico">Pico</span>
            <span class="platform-tag" data-platform="Raspberry Pi">Raspberry Pi</span>
            <span class="platform-tag" data-platform="Seeed">Seeed</span>
            <span class="platform-tag" data-platform="Server">Server</span>
            <span class="platform-tag" data-platform="Sipeed">Sipeed</span>
            <span class="platform-tag" data-platform="Windows">Windows</span>
            <span class="platform-tag" data-platform="XIAO">XIAO</span>
            <span class="platform-tag" data-platform="iOS">iOS</span>
        </div>
        
        <div style="margin-top: 30px;">
            <h2>Projects (<span id="projectCount">0</span>)</h2>
        </div>
        
        <div class="project-grid" id="projectsContainer"></div>
    </div>

    <script>
        const projects = [
            {
                name: "Official OpenClaw Repository",
                description: "Your own personal AI assistant",
                githubUrl: "https://github.com/openclaw/openclaw",
                stars: 251095,
                dailyIncrement: 87,
                category: "embedded",
                platforms: ["PC", "Mac", "Linux", "Windows", "iOS", "Android"],
                productLinks: [""],
                seeedstudio: false
            },
            {
                name: "Nanobot",
                description: "Ultra-Lightweight OpenClaw",
                githubUrl: "https://github.com/HKUDS/nanobot",
                stars: 29724,
                dailyIncrement: 45,
                category: "alternative",
                platforms: ["Mobile", "iOS", "Android"],
                productLinks: [""],
                seeedstudio: false
            },
            {
                name: "ZeroClaw",
                description: "Fast, small, autonomous AI",
                githubUrl: "https://github.com/zeroclaw-labs/zeroclaw",
                stars: 24059,
                dailyIncrement: 32,
                category: "alternative",
                platforms: ["PC", "Server", "Cloud"],
                productLinks: [""],
                seeedstudio: false
            },
            {
                name: "Sipeed PicoClaw",
                description: "Tiny, Fast, Deployable",
                githubUrl: "https://github.com/sipeed/picoclaw",
                stars: 21800,
                dailyIncrement: 25,
                category: "alternative",
                platforms: ["Pico", "Sipeed"],
                productLinks: ["https://www.sipeed.com/picoclaw"],
                seeedstudio: false
            },
            {
                name: "MimiClaw",
                description: "Run OpenClaw on $5 chip",
                githubUrl: "https://github.com/memovai/mimiclaw",
                stars: 3700,
                dailyIncrement: 12,
                category: "embedded",
                platforms: ["Raspberry Pi", "ESP32"],
                productLinks: ["https://www.raspberrypi.com/products/raspberry-pi-5/"],
                seeedstudio: false
            },
            {
                name: "PicoLM",
                description: "1B LLM on $10 board",
                githubUrl: "https://github.com/RightNow-AI/picolm",
                stars: 1200,
                dailyIncrement: 8,
                category: "ai-compute",
                platforms: ["Pico", "Raspberry Pi"],
                productLinks: ["https://www.raspberrypi.com/products/raspberry-pi-5/"],
                seeedstudio: false
            },
            {
                name: "ModelAssistant",
                description: "Embedded AI",
                githubUrl: "https://github.com/Seeed-Studio/ModelAssistant",
                stars: 424,
                dailyIncrement: 5,
                category: "ai-compute",
                platforms: ["NVIDIA Jetson", "Edge"],
                productLinks: ["https://www.seeedstudio.com/reComputer-J4012.html"],
                seeedstudio: true
            },
            {
                name: "reCamera",
                description: "Open-source AI cameras",
                githubUrl: "https://github.com/Seeed-Studio/reCamera",
                stars: 389,
                dailyIncrement: 4,
                category: "ai-compute",
                platforms: ["Camera", "Seeed"],
                productLinks: ["https://www.seeedstudio.com/reCamera"],
                seeedstudio: true
            },
            {
                name: "SenseCraft AI Server",
                description: "AI on edge devices",
                githubUrl: "https://github.com/Seeed-Studio/SenseCraft-AI_Server",
                stars: 60,
                dailyIncrement: 2,
                category: "ai-compute",
                platforms: ["Edge", "NVIDIA Jetson"],
                productLinks: ["https://www.seeedstudio.com/sensecap-ai-watchers.html"],
                seeedstudio: true
            },
            {
                name: "WireClaw",
                description: "ESP32 AI agent",
                githubUrl: "https://github.com/M64GitHub/WireClaw",
                stars: 31,
                dailyIncrement: 1,
                category: "iot",
                platforms: ["ESP32"],
                productLinks: ["https://www.seeedstudio.com/XIAO-ESP32C3.html"],
                seeedstudio: false
            },
            {
                name: "OpenClaw XIAO Node",
                description: "OpenClaw for Seeed XIAO",
                githubUrl: "https://github.com/chilu18/openclaw-esp32c3-xiao-node",
                stars: 4,
                dailyIncrement: 0,
                category: "embedded",
                platforms: ["XIAO", "ESP32"],
                productLinks: ["https://www.seeedstudio.com/XIAO-ESP32C3.html"],
                seeedstudio: true
            },
            {
                name: "Jetson OpenClaw",
                description: "OpenClaw on Jetson",
                githubUrl: "https://github.com/rhuanssauro/jetson-openclaw",
                stars: 1,
                dailyIncrement: 0,
                category: "ai-compute",
                platforms: ["NVIDIA Jetson", "Orin"],
                productLinks: ["https://www.nvidia.com/en-us/autonomous-machines/embedded-systems/jetson-orin/"],
                seeedstudio: false
            },
            {
                name: "Seeed AI Skills",
                description: "Seeed AI expertise",
                githubUrl: "https://github.com/Seeed-Studio/ai-skills",
                stars: 0,
                dailyIncrement: 0,
                category: "maker",
                platforms: ["XIAO", "AI"],
                productLinks: ["https://www.seeedstudio.com/xiao-series"],
                seeedstudio: true
            }
        ];

        // Platform click filter
        document.querySelectorAll('.platform-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.platform-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderProjects();
            });
        });

        // Category filter
        document.getElementById('categoryFilter').addEventListener('change', renderProjects);
        
        // Search filter
        document.getElementById('searchInput').addEventListener('input', renderProjects);

        function filterProjects() {
            const activePlatform = document.querySelector('.platform-tag.active').dataset.platform;
            const category = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            return projects.filter(p => {
                const platformMatch = !activePlatform || p.platforms.includes(activePlatform);
                const categoryMatch = !category || p.category === category;
                const searchMatch = !search || p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
                return platformMatch && categoryMatch && searchMatch;
            });
        }

        function createProjectCard(project) {
            const starsClass = project.stars > 1000 ? 'high' : '';
            const dailyText = project.dailyIncrement > 0 ? `<span class="daily-badge">+${project.dailyIncrement} today</span>` : '';
            
            const platformChips = project.platforms.map(plat => {
                const isSeeed = plat.toLowerCase().includes('seeed') || plat.toLowerCase().includes('xiao');
                return `<span class="platform-chip ${isSeeed ? 'seeed' : ''}">${plat}</span>`;
            }).join('');
            
            const productLinks = project.productLinks.filter(l => l).map(link => 
                `<a href="${link}" target="_blank" class="product-link">📦 Product</a>`
            ).join('');
            
            return `
                <div class="project-card">
                    <div class="project-title">
                        ${project.name}
                        <span class="category-tag">${project.category}</span>
                        ${project.seeedstudio ? '<span class="category-tag seeed-badge">SeeedStudio</span>' : ''}
                    </div>
                    <div class="project-info">${project.description}</div>
                    <div class="platform-list">${platformChips}</div>
                    <div class="product-links">${productLinks}</div>
                    <div>
                        <span class="stars-badge ${starsClass}">⭐ ${project.stars.toLocaleString()}</span>${dailyText}
                    </div>
                    <div style="margin-top: 10px;">
                        <a href="${project.githubUrl}" target="_blank" style="color: #3182ce; text-decoration: none;">View on GitHub →</a>
                    </div>
                </div>
            `;
        }

        function renderProjects() {
            const filtered = filterProjects();
            document.getElementById('projectCount').textContent = filtered.length;
            document.getElementById('projectsContainer').innerHTML = filtered.map(createProjectCard).join('');
        }

        // Initial render
        renderProjects();
    </script>
</body>
</html>
